<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TOPIK Word Matcher</title>
    <style>
        :root {
            --neon-blue: #00f2ff;
            --bg-dark: #000a12;
            --panel-bg: rgba(0, 18, 32, 0.95);
        }
        body {
            margin: 0; background: var(--bg-dark); color: white;
            font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column;
            height: 100vh; overflow: hidden;
        }
        
        header {
            padding: 15px; border-bottom: 2px solid var(--neon-blue);
            background: var(--panel-bg); text-align: center;
        }
        .score-label { font-size: 12px; color: var(--neon-blue); letter-spacing: 2px; }
        #total-score { font-size: 28px; font-weight: 900; display: block; }

        #game-container {
            flex: 1; display: flex; flex-direction: row;
            padding: 15px; gap: 10px; align-items: center;
        }
        .column { display: flex; flex-direction: column; gap: 12px; width: 48%; }
        
        .word-btn {
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(0, 242, 255, 0.2);
            color: white; padding: 18px 5px; border-radius: 12px;
            text-align: center; font-size: 15px; transition: 0.2s;
            -webkit-tap-highlight-color: transparent;
        }
        .word-btn.active { background: var(--neon-blue); color: black; box-shadow: 0 0 15px var(--neon-blue); }
        .word-btn.correct { opacity: 0; transform: scale(0.5); pointer-events: none; }
        .word-btn.wrong { background: #ef4444; border-color: #ef4444; animation: shake 0.3s; }

        @keyframes shake { 0%, 100% {transform: translateX(0);} 25% {transform: translateX(-4px);} 75% {transform: translateX(4px);} }

        /* Score Modal */
        #score-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); display: none;
            flex-direction: column; align-items: center; justify-content: center;
            z-index: 3000;
        }
        .modal-content {
            background: var(--panel-bg); border: 2px solid var(--neon-blue);
            padding: 40px; border-radius: 25px; text-align: center; width: 70%;
        }
        .continue-btn {
            margin-top: 25px; background: var(--neon-blue); border: none;
            padding: 15px 40px; border-radius: 12px; font-weight: bold;
            cursor: pointer; font-size: 16px;
        }

        #loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-dark); display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 4000;
        }

        footer { padding: 15px; text-align: center; font-size: 11px; opacity: 0.5; }
    </style>
</head>
<body>

<div id="loader">
    <div style="width: 40px; height: 40px; border: 4px solid var(--neon-blue); border-top-color: transparent; border-radius: 50%; animation: spin 1s infinite linear;"></div>
    <p>LOADING TOPIK WORDS...</p>
</div>

<header>
    <span class="score-label">TOTAL SCORE</span>
    <span id="total-score">0</span>
</header>

<div id="game-container">
    <div class="column" id="en-list"></div>
    <div class="column" id="ko-list"></div>
</div>

<div id="score-modal">
    <div class="modal-content">
        <h3 style="color: var(--neon-blue); margin: 0; font-size: 14px;">ROUND COMPLETED!</h3>
        <h1 style="font-size: 50px; margin: 10px 0;" id="round-score">0</h1>
        <p style="opacity: 0.8;">Your Score</p>
        <button class="continue-btn" onclick="nextRound()">CONTINUE</button>
    </div>
</div>

<footer>
    DEVELOPED BY SANKALPA LOKULIYANAGE
</footer>

<script src="game.js"></script>

</body>
</html>
