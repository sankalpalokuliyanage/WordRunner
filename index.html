<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TOPIK MASTER</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00f2ff; --accent: #ff00ff; --bg: #000810; --glass: rgba(0, 20, 40, 0.4); }
        .theme-bts { --neon: #bb86fc; --accent: #03dac6; --bg: #120024; }
        .theme-blackpink { --neon: #f8a5c2; --accent: #ffffff; --bg: #000000; }
        .theme-traditional { --neon: #e67e22; --accent: #c0392b; --bg: #1a0f00; }

        body { margin: 0; background: var(--bg); color: white; font-family: 'Rajdhani', sans-serif; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        
        /* HUD & Header */
        header { padding: 12px 20px; border-bottom: 1px solid var(--neon); background: rgba(0,0,0,0.5); display: flex; justify-content: space-between; align-items: center; z-index: 100; }
        .timer-track { height: 4px; background: #111; width: 100%; position: absolute; bottom: 0; left: 0; }
        #oxygen-bar { height: 100%; background: var(--neon); width: 100%; transition: 0.1s linear; }

        /* Combo Meter */
        #combo-container { position: fixed; top: 80px; left: 50%; transform: translateX(-50%); text-align: center; pointer-events: none; z-index: 50; }
        #combo-text { font-family: 'Orbitron'; font-size: 24px; font-weight: 900; color: var(--accent); text-shadow: 0 0 10px var(--accent); opacity: 0; transition: 0.2s; }

        /* Game Area & Bubbles */
        #game-area { flex: 1; display: none; position: relative; padding: 20px; }
        .bubble-container { display: flex; justify-content: space-around; width: 100%; height: 80%; margin-top: 40px; }
        .column { display: flex; flex-direction: column; justify-content: space-around; height: 100%; }

        .bubble {
            width: 85px; height: 85px;
            background: var(--glass);
            border: 2px solid var(--neon);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            text-align: center; font-size: 13px; font-weight: 700;
            cursor: pointer; position: relative;
            box-shadow: inset 0 0 15px var(--neon), 0 0 10px rgba(0, 242, 255, 0.2);
            animation: float 4s ease-in-out infinite;
            transition: transform 0.2s, background 0.3s;
            user-select: none; -webkit-tap-highlight-color: transparent;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(3deg); }
        }

        .bubble.active { background: var(--neon); color: black; transform: scale(1.15); box-shadow: 0 0 30px var(--neon); }
        
        /* Particle Effect */
        .particle {
            position: absolute; pointer-events: none;
            width: 6px; height: 6px; background: var(--neon);
            border-radius: 50%; animation: popOut 0.6s ease-out forwards;
        }

        @keyframes popOut {
            to { transform: translate(var(--x), var(--y)); opacity: 0; }
        }

        /* Developed By Footer */
        .developed-by { text-align: center; font-size: 10px; letter-spacing: 2px; padding: 10px; opacity: 0.5; font-weight: bold; color: var(--neon); }
        
        /* Logic for other screens remains similar */
        .hidden { display: none !important; }
        .full-screen { position: fixed; inset: 0; background: var(--bg); z-index: 9000; display: flex; align-items: center; justify-content: center; }
        .cyber-card { background: rgba(0, 20, 40, 0.9); border: 2px solid var(--neon); padding: 30px 20px; border-radius: 30px; width: 85%; max-width: 360px; text-align: center; }
        input { background: rgba(0, 242, 255, 0.05); border: 1px solid #1e3a4f; color: white; padding: 14px; border-radius: 12px; width: 100%; margin-bottom: 12px; font-size: 16px; box-sizing: border-box; }
        .btn-neon { background: var(--neon); color: black; border: none; padding: 14px; border-radius: 12px; font-weight: 900; width: 100%; font-family: 'Orbitron'; cursor: pointer; }
    </style>
</head>
<body>

<div id="auth-screen" class="full-screen">
    <div class="cyber-card">
        <h2 style="font-family: 'Orbitron'; color: var(--neon);">LOGIN</h2>
        <input type="text" id="auth-user" placeholder="Username">
        <input type="password" id="auth-pass" placeholder="Password">
        <button class="btn-neon" onclick="handleAuth('login')">INITIALIZE</button>
        <p style="font-size: 12px; margin: 15px 0; opacity: 0.5;">OR</p>
        <button class="btn-neon" style="background:none; border: 1px solid var(--neon); color: white;" onclick="handleAuth('signup')">CREATE ID</button>
        <div class="developed-by" style="margin-top: 20px;">Developed by Sankalpa Lokuliyanage</div>
    </div>
</div>

<header id="hud" class="hidden">
    <div style="flex: 1;">
        <div id="rank-display" style="font-size: 9px; color: var(--neon); font-weight: bold;">BEGINNER CADET</div>
        <div id="user-display" style="font-size: 14px; font-weight: 900;">PILOT: ---</div>
    </div>
    <div style="flex: 1; text-align: right;">
        <div style="font-size: 9px; opacity: 0.7;">TOTAL CREDITS</div>
        <div id="score-display" style="font-size: 20px; font-weight: 900; color: var(--neon);">0</div>
    </div>
    <div class="timer-track"><div id="oxygen-bar"></div></div>
</header>

<div id="combo-container"><div id="combo-text">COMBO X2</div></div>

<div id="game-area">
    <div style="display: flex; justify-content: space-between; margin-bottom: 10px;">
        <button onclick="exitGame()" style="background: none; border: 1px solid var(--neon); color: var(--neon); padding: 5px 10px; border-radius: 8px; font-size: 11px;">EXIT MISSION</button>
    </div>
    <div class="bubble-container">
        <div class="column" id="en-list"></div>
        <div class="column" id="ko-list"></div>
    </div>
    <div class="developed-by" style="margin-top: auto;">Developed by Sankalpa Lokuliyanage</div>
</div>

<script src="game.js"></script>
</body>
</html>
