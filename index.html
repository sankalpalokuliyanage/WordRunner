<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TOPIK Advance Matcher</title>
    <style>
        :root {
            --neon-blue: #00f2ff;
            --bg-dark: #000a12;
            --panel-bg: rgba(0, 18, 32, 0.9);
        }
        body {
            margin: 0; background: var(--bg-dark); color: white;
            font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column;
            height: 100vh; overflow: hidden;
        }
        
        /* Stats Panel */
        header {
            padding: 15px; border-bottom: 2px solid var(--neon-blue);
            background: var(--panel-bg); display: flex; justify-content: space-around;
            text-align: center;
        }
        .stat-item { flex: 1; }
        .label { font-size: 10px; color: var(--neon-blue); letter-spacing: 1px; }
        .val { font-size: 18px; font-weight: bold; display: block; }

        /* Game Board */
        #game-container {
            flex: 1; display: flex; flex-direction: row;
            padding: 10px; gap: 10px; align-items: center;
        }
        .column { display: flex; flex-direction: column; gap: 12px; width: 48%; }
        
        .word-btn {
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(0, 242, 255, 0.2);
            color: white; padding: 18px 5px; border-radius: 12px;
            text-align: center; font-size: 14px; transition: 0.2s;
            -webkit-tap-highlight-color: transparent;
        }
        .word-btn.active { background: var(--neon-blue); color: black; box-shadow: 0 0 15px var(--neon-blue); }
        .word-btn.correct { opacity: 0; transform: scale(0.5); pointer-events: none; }
        .word-btn.wrong { background: #ef4444; border-color: #ef4444; animation: shake 0.3s; }

        @keyframes shake { 0%, 100% {transform: translateX(0);} 25% {transform: translateX(-4px);} 75% {transform: translateX(4px);} }

        /* Rank Popup */
        #rank-modal {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: var(--panel-bg); border: 2px solid var(--neon-blue);
            padding: 25px; border-radius: 20px; text-align: center;
            z-index: 3000; display: none; width: 80%;
        }

        #loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-dark); display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 4000;
        }

        footer { padding: 10px; text-align: center; font-size: 11px; opacity: 0.5; border-top: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body>

<div id="loader">
    <div style="width: 40px; height: 40px; border: 4px solid var(--neon-blue); border-top-color: transparent; border-radius: 50%; animation: spin 1s infinite linear;"></div>
    <p>SYNCING PROGRESS...</p>
</div>

<header>
    <div class="stat-item">
        <span class="label">SCORE</span>
        <span id="score" class="val">0</span>
    </div>
    <div class="stat-item">
        <span class="label">RANK</span>
        <span id="rank-text" class="val" style="color: var(--neon-blue);">BEGINNER</span>
    </div>
    <div class="stat-item">
        <span class="label">ACCURACY</span>
        <span id="accuracy" class="val">0%</span>
    </div>
</header>

<div id="game-container">
    <div class="column" id="en-list"></div>
    <div class="column" id="ko-list"></div>
</div>

<div id="rank-modal">
    <h2 id="modal-rank" style="color: var(--neon-blue); margin: 0;">MASTER!</h2>
    <p id="modal-msg">You've unlocked a new rank!</p>
    <button onclick="closeModal()" style="background: var(--neon-blue); border: none; padding: 10px 20px; border-radius: 10px; font-weight: bold;">KEEP GOING</button>
</div>

<footer>
    DEVELOPED BY SANKALPA LOKULIYANAGE
</footer>

<script src="game.js"></script>

</body>
</html>
