<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lexicon Jet: Sky Navigator</title>
    <style>
        body { margin: 0; overflow: hidden; background: #87ceeb; touch-action: none; font-family: 'Orbitron', sans-serif; }
        #joystick-zone { position: absolute; bottom: 50px; left: 50px; width: 120px; height: 120px; z-index: 100; opacity: 0.7; }
        
        #ui-overlay {
            position: absolute; top: 20px; width: 100%; text-align: center;
            color: white; pointer-events: none; z-index: 10;
        }

        .hud-display {
            background: rgba(0, 40, 80, 0.6);
            border: 2px solid #00f2ff;
            border-radius: 15px;
            padding: 15px 30px;
            display: inline-block;
            backdrop-filter: blur(5px);
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.3);
        }

        #target-label { font-size: 12px; color: #00f2ff; letter-spacing: 2px; margin-bottom: 5px; }
        #word { font-size: 32px; font-weight: 900; color: #fff; text-shadow: 0 0 10px #00f2ff; }
        #score-board { position: absolute; top: 20px; right: 20px; color: #00f2ff; font-weight: bold; }

        #loader { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #001220; display: flex; align-items: center; justify-content: center; z-index: 1000; 
            color: #00f2ff; flex-direction: column;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
</head>
<body>

<div id="loader">
    <h2 style="letter-spacing: 5px; margin-bottom: 10px;">INITIALIZING JET...</h2>
    <div style="font-size: 12px; opacity: 0.6;">SYNCING KOREAN DATABASE</div>
</div>

<div id="ui-overlay">
    <div id="score-board">SCORE: <span id="count">0</span></div>
    <div class="hud-display">
        <div id="target-label">NAVIGATION TARGET</div>
        <div id="word">SYNCING...</div>
    </div>
</div>

<div id="joystick-zone"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.9.0/nipplejs.min.js"></script>
<script src="game.js"></script>

</body>
</html>
