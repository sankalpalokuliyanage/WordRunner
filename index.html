<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TOPIK Master | Word Matcher</title>
    <style>
        :root {
            --neon-blue: #00f2ff;
            --bg-dark: #000a12;
            --panel-bg: rgba(0, 18, 32, 0.95);
        }
        body {
            margin: 0; background: var(--bg-dark); color: white;
            font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column;
            height: 100vh; overflow: hidden;
        }
        
        header { padding: 15px; border-bottom: 2px solid var(--neon-blue); background: var(--panel-bg); text-align: center; }
        .score-label { font-size: 11px; color: var(--neon-blue); letter-spacing: 2px; font-weight: bold; }
        #total-score { font-size: 32px; font-weight: 900; display: block; }

        /* Level Selection Screen */
        #level-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-dark); z-index: 5000; display: flex;
            flex-direction: column; align-items: center; justify-content: center;
        }
        .level-grid {
            display: grid; grid-template-columns: repeat(2, 1fr);
            gap: 15px; width: 85%; max-width: 400px; margin-top: 25px;
        }
        .level-btn {
            background: rgba(0, 242, 255, 0.05); border: 1px solid var(--neon-blue);
            color: white; padding: 25px 10px; border-radius: 15px;
            font-weight: bold; cursor: pointer; text-align: center; font-size: 14px;
            transition: 0.3s;
        }
        .level-btn:active { background: var(--neon-blue); color: black; }

        /* Game UI */
        #game-container {
            flex: 1; display: flex; flex-direction: row;
            padding: 15px; gap: 12px; align-items: center;
            max-width: 500px; margin: auto; width: 95%;
        }
        .column { display: flex; flex-direction: column; gap: 12px; width: 50%; }
        
        .word-btn {
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(0, 242, 255, 0.2);
            color: white; padding: 20px 5px; border-radius: 12px;
            text-align: center; font-size: 14px; font-weight: 500; transition: 0.2s;
            min-height: 60px; display: flex; align-items: center; justify-content: center;
            -webkit-tap-highlight-color: transparent;
        }
        .word-btn.active { background: var(--neon-blue); color: black; box-shadow: 0 0 15px var(--neon-blue); border-color: #fff; }
        .word-btn.correct { opacity: 0; transform: scale(0.5); pointer-events: none; }
        .word-btn.wrong { background: #ef4444; border-color: #ef4444; animation: shake 0.3s; }

        /* Modal */
        #score-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); display: none;
            flex-direction: column; align-items: center; justify-content: center;
            z-index: 3000;
        }
        .modal-content {
            background: var(--panel-bg); border: 2px solid var(--neon-blue);
            padding: 40px 20px; border-radius: 25px; text-align: center; width: 80%;
        }
        .btn-action {
            margin-top: 15px; background: var(--neon-blue); border: none;
            padding: 15px; border-radius: 12px; font-weight: bold; width: 100%;
        }

        #loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-dark); display: none; flex-direction: column;
            align-items: center; justify-content: center; z-index: 6000;
        }

        /* Animations */
        @keyframes shake { 0%, 100% {transform: translateX(0);} 25% {transform: translateX(-4px);} 75% {transform: translateX(4px);} }
        @keyframes spin { to { transform: rotate(360deg); } }

        footer { padding: 10px; text-align: center; font-size: 10px; opacity: 0.4; }
    </style>
</head>
<body>

<div id="level-screen">
    <h2 style="color: var(--neon-blue); letter-spacing: 3px; margin-bottom: 5px;">TOPIK MASTER</h2>
    <p style="font-size: 12px; opacity: 0.7;">Select your vocabulary level</p>
    <div class="level-grid">
        <div class="level-btn" onclick="startGame('Level 1')">LEVEL 1</div>
        <div class="level-btn" onclick="startGame('Level 2')">LEVEL 2</div>
        <div class="level-btn" onclick="startGame('Level 3')">LEVEL 3</div>
        <div class="level-btn" onclick="startGame('Level 4')">LEVEL 4</div>
        <div class="level-btn" onclick="startGame('Level 5')">LEVEL 5</div>
        <div class="level-btn" onclick="startGame('Level 6')">LEVEL 6</div>
    </div>
</div>

<div id="loader">
    <div style="width: 40px; height: 40px; border: 4px solid var(--neon-blue); border-top-color: transparent; border-radius: 50%; animation: spin 1s infinite linear;"></div>
    <p style="color: var(--neon-blue); margin-top: 15px;">LOADING WORDS...</p>
</div>

<header>
    <div style="display: flex; justify-content: space-between; align-items: center; padding: 0 15px;">
        <button onclick="location.reload()" style="background: none; border: 1px solid var(--neon-blue); color: var(--neon-blue); padding: 5px 12px; border-radius: 8px; font-size: 11px;">MENU</button>
        <div>
            <span class="score-label">SCORE</span>
            <span id="total-score">0</span>
        </div>
        <span id="current-lvl-display" style="font-size: 11px; color: var(--neon-blue); font-weight: bold;"></span>
    </div>
</header>

<div id="game-container">
    <div class="column" id="en-list"></div>
    <div class="column" id="ko-list"></div>
</div>

<div id="score-modal">
    <div class="modal-content">
        <h3 style="color: var(--neon-blue); margin: 0; font-size: 14px;">ROUND CLEARED!</h3>
        <h1 style="font-size: 55px; margin: 15px 0;" id="round-score">0</h1>
        <button class="btn-action" onclick="nextRound()">CONTINUE</button>
        <button class="btn-action" style="background:none; color:white; border:1px solid #444;" onclick="location.reload()">EXIT</button>
    </div>
</div>

<footer>DEVELOPED BY SANKALPA LOKULIYANAGE</footer>

<script src="game.js"></script>

</body>
</html>
