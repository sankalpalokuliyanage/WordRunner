<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lexicon Dungeon 3D | Mobile Edition</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; touch-action: none; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #joystick-zone { position: absolute; bottom: 40px; left: 40px; width: 120px; height: 120px; z-index: 100; opacity: 0.8; }
        #ui-overlay {
            position: absolute; top: 15px; width: 100%; text-align: center;
            color: white; pointer-events: none; z-index: 10;
        }
        .target-box { 
            background: rgba(15, 23, 42, 0.8); padding: 12px 25px; 
            border-radius: 20px; display: inline-block; 
            border: 2px solid #4f46e5; box-shadow: 0 0 15px rgba(79, 70, 229, 0.4);
        }
        .target-word { font-size: 26px; font-weight: 900; color: #38bdf8; text-transform: uppercase; letter-spacing: 2px; }
        #stats { font-size: 12px; margin-bottom: 5px; color: #94a3b8; text-transform: uppercase; font-weight: bold; }
        #loader { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: radial-gradient(circle, #1e1b4b, #000); 
            display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; 
        }
        .spinner { border: 4px solid rgba(255,255,255,0.1); border-left-color: #4f46e5; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin-bottom: 15px; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="loader">
    <div class="spinner"></div>
    <h3 style="color: white; letter-spacing: 1px;">SYNCING KOREAN DATA...</h3>
</div>

<div id="ui-overlay">
    <div class="target-box">
        <div id="stats">Level 1-1 | Mastered: <span id="count">0</span>/50</div>
        <div class="target-word" id="word">READY?</div>
    </div>
</div>

<div id="joystick-zone"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.9.0/nipplejs.min.js"></script>
<script src="game.js"></script>

</body>
</html>
