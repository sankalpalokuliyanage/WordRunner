<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TOPIK Master | Universe</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        /* CSS Variables for Themes */
        :root { --neon: #00f2ff; --accent: #ff00ff; --bg: #000810; --glass: rgba(0, 20, 40, 0.85); }
        
        .theme-bts { --neon: #bb86fc; --accent: #03dac6; --bg: #120024; --glass: rgba(187, 134, 252, 0.1); }
        .theme-blackpink { --neon: #f8a5c2; --accent: #ffffff; --bg: #000000; --glass: rgba(248, 165, 194, 0.15); }
        .theme-traditional { --neon: #e67e22; --accent: #c0392b; --bg: #1a0f00; --glass: rgba(230, 126, 34, 0.1); }

        body { margin: 0; background: var(--bg); color: white; font-family: 'Rajdhani', sans-serif; height: 100vh; overflow: hidden; transition: 0.5s ease; }
        
        /* Auth Screen */
        .full-screen { position: fixed; inset: 0; background: var(--bg); z-index: 9000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .cyber-card { background: var(--glass); border: 2px solid var(--neon); padding: 30px 20px; border-radius: 30px; width: 100%; max-width: 360px; text-align: center; box-shadow: 0 0 30px rgba(0, 242, 255, 0.15); backdrop-filter: blur(15px); }
        
        input { background: rgba(0, 242, 255, 0.05); border: 1px solid #1e3a4f; color: white; padding: 14px; border-radius: 12px; width: 100%; margin-bottom: 12px; box-sizing: border-box; font-size: 16px; font-family: inherit; }
        .btn-neon { background: var(--neon); color: black; border: none; padding: 14px; border-radius: 12px; font-weight: 900; width: 100%; cursor: pointer; text-transform: uppercase; font-family: 'Orbitron'; letter-spacing: 1px; }

        /* HUD Header */
        header { padding: 12px 20px; border-bottom: 1px solid var(--neon); background: rgba(0,0,0,0.5); display: flex; justify-content: space-between; align-items: center; }
        .timer-track { height: 5px; background: #111; width: 100%; position: absolute; bottom: 0; left: 0; }
        #oxygen-bar { height: 100%; background: var(--neon); width: 100%; transition: 0.1s linear; }

        /* Dashboard */
        #dashboard { flex: 1; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 20px; overflow-y: auto; }
        .theme-grid { display: flex; gap: 15px; margin-bottom: 30px; }
        .theme-btn { width: 45px; height: 45px; border-radius: 50%; border: 2px solid #fff; cursor: pointer; transition: 0.3s; }
        
        .level-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; width: 100%; max-width: 400px; }
        .level-card { background: var(--glass); border: 1px solid var(--neon); padding: 20px 10px; border-radius: 20px; text-align: center; position: relative; }
        .lvl-label { font-size: 10px; color: var(--neon); letter-spacing: 2px; display: block; }
        .lvl-name { font-size: 14px; font-weight: 700; margin-top: 5px; }

        /* Game Area */
        #game-area { flex: 1; display: none; flex-direction: column; justify-content: center; padding: 10px; }
        .game-grid { display: flex; gap: 10px; width: 100%; max-width: 500px; margin: auto; }
        .column { flex: 1; display: flex; flex-direction: column; gap: 10px; }
        .node { background: var(--glass); border: 1px solid rgba(0, 242, 255, 0.2); padding: 18px 5px; border-radius: 15px; text-align: center; font-size: 15px; font-weight: 700; transition: 0.3s; min-height: 55px; display: flex; align-items: center; justify-content: center; }
        .node.active { background: var(--neon); color: black; box-shadow: 0 0 20px var(--neon); }
        .node.correct { transform: scale(0); opacity: 0; pointer-events: none; }
        .node.wrong { border-color: red; background: rgba(255,0,0,0.1); animation: shake 0.3s; }

        @keyframes shake { 0%, 100% {transform: translateX(0);} 25% {transform: translateX(-5px);} 75% {transform: translateX(5px);} }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="auth-screen" class="full-screen">
    <div class="cyber-card">
        <h2 style="font-family: 'Orbitron'; color: var(--neon); margin-top: 0;">PILOT LOGIN</h2>
        <input type="text" id="auth-user" placeholder="Enter Username">
        <input type="password" id="auth-pass" placeholder="Enter Access Code">
        <button class="btn-neon" onclick="handleAuth('login')">INITIALIZE</button>
        <p style="font-size: 12px; margin: 15px 0; opacity: 0.5;">OR</p>
        <button class="btn-neon" style="background:none; border: 1px solid var(--neon); color: white;" onclick="handleAuth('signup')">CREATE NEW ID</button>
    </div>
</div>

<header id="hud" class="hidden">
    <div style="flex: 1;">
        <div id="rank-display" style="font-size: 9px; color: var(--neon); font-weight: bold;">BEGINNER CADET</div>
        <div id="user-display" style="font-size: 14px; font-weight: 900;">PILOT: ---</div>
    </div>
    <div style="flex: 1; text-align: right;">
        <div style="font-size: 9px; opacity: 0.7;">TOTAL CREDITS</div>
        <div id="score-display" style="font-size: 20px; font-weight: 900; color: var(--neon);">0</div>
    </div>
    <div class="timer-track"><div id="oxygen-bar"></div></div>
</header>

<div id="dashboard">
    <div class="theme-grid">
        <div class="theme-btn" style="background: #00f2ff;" onclick="changeTheme('dark')"></div>
        <div class="theme-btn" style="background: #bb86fc;" onclick="changeTheme('bts')"></div>
        <div class="theme-btn" style="background: #f8a5c2;" onclick="changeTheme('blackpink')"></div>
        <div class="theme-btn" style="background: #e67e22;" onclick="changeTheme('traditional')"></div>
    </div>
    <h3 style="font-family: 'Orbitron'; letter-spacing: 4px; margin-bottom: 25px;">SELECT SECTOR</h3>
    <div class="level-grid">
        <div class="level-card" onclick="startMission('Level 1')"><span class="lvl-label">SECTOR 1</span><div class="lvl-name">Beginner I</div></div>
        <div class="level-card" onclick="startMission('Level 2')"><span class="lvl-label">SECTOR 2</span><div class="lvl-name">Beginner II</div></div>
        <div class="level-card" onclick="startMission('Level 3')"><span class="lvl-label">SECTOR 3</span><div class="lvl-name">Explorer I</div></div>
        <div class="level-card" onclick="startMission('Level 4')"><span class="lvl-label">SECTOR 4</span><div class="lvl-name">Explorer II</div></div>
        <div class="level-card" onclick="startMission('Level 5')"><span class="lvl-label">SECTOR 5</span><div class="lvl-name">Commander I</div></div>
        <div class="level-card" onclick="startMission('Level 6')"><span class="lvl-label">SECTOR 6</span><div class="lvl-name">Commander II</div></div>
    </div>
    <button onclick="location.reload()" style="margin-top: 40px; background: none; border: none; color: #444; cursor: pointer;">[ LOGOUT ]</button>
</div>

<div id="game-area">
    <div style="display: flex; justify-content: space-between; margin-bottom: 15px;">
        <button onclick="exitGame()" style="background: none; border: 1px solid var(--neon); color: var(--neon); padding: 5px 12px; border-radius: 8px; font-size: 11px;">EXIT MISSION</button>
        <div id="mission-status" style="font-size: 12px; color: var(--neon);">MISSION ACTIVE</div>
    </div>
    <div class="game-grid">
        <div class="column" id="en-list"></div>
        <div class="column" id="ko-list"></div>
    </div>
</div>

<script src="game.js"></script>
</body>
</html>
