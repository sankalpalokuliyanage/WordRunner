<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lexicon Terminal | Word Matcher</title>
    <style>
        :root {
            --neon-blue: #00f2ff;
            --neon-purple: #bc13fe;
            --bg-dark: #000a12;
        }
        body {
            margin: 0; padding: 0;
            background: var(--bg-dark);
            color: white;
            font-family: 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
            display: flex; flex-direction: column; height: 100vh;
        }
        header {
            padding: 20px; text-align: center;
            border-bottom: 1px solid rgba(0, 242, 255, 0.2);
        }
        .score-box { font-weight: bold; color: var(--neon-blue); letter-spacing: 2px; }
        
        #game-container {
            flex: 1;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 10px;
        }

        .column {
            display: flex; flex-direction: column; gap: 15px; width: 45%;
        }

        .word-btn {
            background: rgba(0, 242, 255, 0.05);
            border: 1px solid rgba(0, 242, 255, 0.3);
            color: white;
            padding: 18px 10px;
            border-radius: 12px;
            text-align: center;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
            -webkit-tap-highlight-color: transparent;
        }

        .word-btn.active {
            background: var(--neon-blue);
            color: black;
            box-shadow: 0 0 20px var(--neon-blue);
            transform: scale(1.05);
        }

        .word-btn.correct {
            background: #10b981;
            border-color: #10b981;
            opacity: 0;
            transform: scale(0.8);
            pointer-events: none;
        }

        .word-btn.wrong {
            background: #ef4444;
            border-color: #ef4444;
            animation: shake 0.3s;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        #loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-dark);
            display: flex; align-items: center; justify-content: center;
            z-index: 1000; font-weight: bold; color: var(--neon-blue);
        }
    </style>
</head>
<body>

<div id="loader">BOOTING TERMINAL...</div>

<header>
    <div class="score-box">MATCHED: <span id="count">0</span></div>
</header>

<div id="game-container">
    <div class="column" id="en-list"></div>
    <div class="column" id="ko-list"></div>
</div>

<script src="game.js"></script>

</body>
</html>
