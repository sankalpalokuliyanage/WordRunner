<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TOPIK Command Center</title>
    <style>
        :root { --neon: #00f2ff; --warn: #ff0055; --bg: #000810; --card: rgba(0, 20, 40, 0.9); }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Orbitron', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* Background Animation */
        body::before { content: ""; position: fixed; inset: 0; background: url('https://www.transparenttextures.com/patterns/stardust.png'); opacity: 0.3; z-index: -1; }

        /* Auth & Level Screen */
        .full-screen { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9000; background: var(--bg); padding: 20px; transition: 0.5s; }
        .glass-card { background: var(--card); border: 1px solid var(--neon); padding: 30px; border-radius: 20px; width: 100%; max-width: 360px; text-align: center; box-shadow: 0 0 20px rgba(0, 242, 255, 0.1); }
        
        /* Input & Buttons */
        .input-box { background: rgba(0, 242, 255, 0.05); border: 1px solid #1e3a4f; color: white; padding: 12px; border-radius: 8px; width: 100%; margin-bottom: 10px; box-sizing: border-box; }
        .btn-action { background: var(--neon); color: black; border: none; padding: 12px; border-radius: 8px; font-weight: 900; width: 100%; cursor: pointer; text-transform: uppercase; margin-top: 10px; }

        /* HUD Header */
        header { padding: 10px 20px; border-bottom: 1px solid var(--neon); background: rgba(0, 10, 20, 0.8); display: flex; justify-content: space-between; align-items: center; }
        .timer-bar { height: 4px; background: #111; width: 100%; position: relative; overflow: hidden; }
        #oxygen-fill { height: 100%; background: var(--neon); width: 100%; transition: 0.1s linear; }

        /* Mission UI */
        #game-area { flex: 1; display: none; flex-direction: column; padding: 15px; }
        .mission-grid { display: flex; gap: 15px; flex: 1; align-items: center; }
        .column { flex: 1; display: flex; flex-direction: column; gap: 10px; }
        
        .word-node { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(0, 242, 255, 0.2); color: white; padding: 15px 5px; border-radius: 10px; text-align: center; font-size: 13px; cursor: pointer; transition: 0.3s; min-height: 50px; display: flex; align-items: center; justify-content: center; }
        .word-node.active { border-color: var(--neon); box-shadow: 0 0 15px var(--neon); background: rgba(0, 242, 255, 0.1); }
        .word-node.correct { transform: scale(0); opacity: 0; pointer-events: none; }
        .word-node.wrong { border-color: var(--warn); background: rgba(255, 0, 85, 0.1); animation: shake 0.3s; }

        /* Back Button & Stats */
        .nav-btn { background: none; border: 1px solid var(--neon); color: var(--neon); padding: 5px 10px; border-radius: 5px; font-size: 10px; cursor: pointer; }

        @keyframes shake { 0%, 100% {transform: translateX(0);} 25% {transform: translateX(-4px);} 75% {transform: translateX(4px);} }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="auth-screen" class="full-screen">
    <div class="glass-card">
        <h2 style="color: var(--neon); margin-top: 0;">ID VERIFICATION</h2>
        <input type="text" id="auth-user" class="input-box" placeholder="PILOT NAME">
        <input type="password" id="auth-pass" class="input-box" placeholder="ACCESS CODE">
        <button class="btn-action" onclick="handleAuth('login')">INITIALIZE</button>
        <button class="btn-action" style="background:none; border:1px solid var(--neon); color:white;" onclick="handleAuth('signup')">NEW REGISTER</button>
    </div>
</div>

<header id="hud" class="hidden">
    <div style="flex: 1;">
        <button class="nav-btn" onclick="backToMenu()">EXIT MISSION</button>
        <div id="user-display" style="font-size: 12px; margin-top: 5px; font-weight: bold;">PILOT: ---</div>
    </div>
    <div style="flex: 1; text-align: center;">
        <div style="font-size: 9px; letter-spacing: 2px;">OXYGEN LEVEL</div>
        <div class="timer-bar"><div id="oxygen-fill"></div></div>
    </div>
    <div style="flex: 1; text-align: right;">
        <div style="font-size: 9px;">CREDITS</div>
        <div id="total-score-display" style="font-size: 18px; font-weight: 900; color: var(--neon);">0</div>
    </div>
</header>

<div id="level-screen" class="full-screen hidden">
    <h3 style="color: var(--neon); letter-spacing: 5px;">SELECT SECTOR</h3>
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; max-width: 350px;">
        <button class="word-node" onclick="startMission('Level 1')">SECTOR 01</button>
        <button class="word-node" onclick="startMission('Level 2')">SECTOR 02</button>
        <button class="word-node" onclick="startMission('Level 3')">SECTOR 03</button>
        <button class="word-node" onclick="startMission('Level 4')">SECTOR 04</button>
        <button class="word-node" onclick="startMission('Level 5')">SECTOR 05</button>
        <button class="word-node" onclick="startMission('Level 6')">SECTOR 06</button>
    </div>
</div>

<div id="game-area">
    <div class="mission-grid">
        <div class="column" id="en-list"></div>
        <div class="column" id="ko-list"></div>
    </div>
</div>

<script src="game.js"></script>
</body>
</html>
